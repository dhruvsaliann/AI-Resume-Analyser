openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI Resume Analyzer - Dual Mode Hiring Platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: resume
    description: Resume analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /resume/analyze:
    post:
      operationId: analyzeResume
      tags: [resume]
      summary: Candidate mode - analyze resume against job description
      description: Upload a PDF resume and provide a job description to get AI-powered candidate analysis
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - resume
                - jobDescription
              properties:
                resume:
                  type: string
                  format: binary
                  description: PDF resume file
                jobDescription:
                  type: string
                  description: Job description text
      responses:
        "200":
          description: Candidate analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateAnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /resume/generate-draft:
    post:
      operationId: generateResumeDraft
      tags: [resume]
      summary: Generate an improved resume draft
      description: Uses extracted resume text, job description and keyword analysis to generate a clean ATS-friendly improved resume draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDraftBody"
      responses:
        "200":
          description: Improved resume draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeDraftResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /resume/evaluate:
    post:
      operationId: evaluateResume
      tags: [resume]
      summary: Recruiter mode - evaluate candidate fit for a role
      description: Upload a candidate resume PDF and provide a job description to get a recruiter-facing evaluation
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - resume
                - jobDescription
              properties:
                resume:
                  type: string
                  format: binary
                  description: Candidate PDF resume file
                jobDescription:
                  type: string
                  description: Job description text
      responses:
        "200":
          description: Recruiter evaluation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterEvaluationResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CandidateAnalysisResult:
      type: object
      required:
        - matchScore
        - matchedKeywords
        - missingKeywords
        - suggestions
        - strengths
        - extractedText
      properties:
        matchScore:
          type: number
          description: Match score from 0 to 100
        matchedKeywords:
          type: array
          items:
            type: string
          description: Keywords found in both resume and job description
        missingKeywords:
          type: array
          items:
            type: string
          description: Keywords in job description but not in resume
        suggestions:
          type: array
          items:
            type: string
          description: AI-generated improvement suggestions
        strengths:
          type: array
          items:
            type: string
          description: AI-identified resume strengths
        extractedText:
          type: string
          description: Text extracted from the PDF resume
    RecruiterEvaluationResult:
      type: object
      required:
        - fitScore
        - hiringRecommendation
        - matchedSkills
        - missingSkills
        - experienceSummary
        - strengths
        - concerns
        - nextStep
        - scoreRationale
      properties:
        fitScore:
          type: number
          description: Candidate fit score from 0 to 100
        hiringRecommendation:
          type: string
          enum:
            - Strong Fit
            - Moderate Fit
            - Low Fit
          description: Overall hiring recommendation
        matchedSkills:
          type: array
          items:
            type: string
          description: Skills the candidate has that match the role
        missingSkills:
          type: array
          items:
            type: string
          description: Required skills missing from the candidate profile
        experienceSummary:
          type: string
          description: Brief summary of candidate experience relevant to the role
        strengths:
          type: array
          items:
            type: string
          description: Candidate strengths relevant to the role
        concerns:
          type: array
          items:
            type: string
          description: Gaps or concerns about the candidate
        nextStep:
          type: string
          enum:
            - Shortlist for Screening
            - Consider with Caution
            - Not Suitable for This Role
          description: Recommended recruiter action
        scoreRationale:
          type: string
          description: Brief explanation of the fit score
    DraftExperienceEntry:
      type: object
      required:
        - role
        - bullets
      properties:
        role:
          type: string
        company:
          type: string
        duration:
          type: string
        bullets:
          type: array
          items:
            type: string
    DraftProjectEntry:
      type: object
      required:
        - name
        - bullets
      properties:
        name:
          type: string
        description:
          type: string
        bullets:
          type: array
          items:
            type: string
    ResumeDraftResult:
      type: object
      required:
        - professionalSummary
        - skills
        - experience
      properties:
        professionalSummary:
          type: string
        skills:
          type: array
          items:
            type: string
        experience:
          type: array
          items:
            $ref: "#/components/schemas/DraftExperienceEntry"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/DraftProjectEntry"
        notes:
          type: string
    GenerateDraftBody:
      type: object
      required:
        - resumeText
        - jobDescription
      properties:
        resumeText:
          type: string
        jobDescription:
          type: string
        matchedKeywords:
          type: array
          items:
            type: string
        missingKeywords:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
        useHighConfidenceOnly:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
